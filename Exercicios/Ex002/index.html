<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo JavaScript</title>
    <style>
        body{
            background-color: rgb(106, 80, 177);
            color: white;
            font: normal 20pt Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Ja me livrei da maldição</p>
    <script>
        // na linha abaixo a variavel "nome" está recebendo a resposta do "window.prompt".

       var nome = window.prompt('Qual é o seu nome ?') //vai perguntar o nome da pessoa
       window.alert('é um prazer te conhecer, ' + nome + '!')


       // o " + " significa concatenação, vai juntar uma coisa a outra, no caso do comando, vai juntar o resultado da variavel a frase "é um prazer te conhecer, "
    </script>
</body>
</html>
