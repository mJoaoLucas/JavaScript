<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Nacionalidades</h1>

    em qual país você mora ? <input type="text" name="ct" id="ct"> 

    <input type="button" value="Verificar" onclick="verificando()">
    <div id="res">

    </div>
    <script>
        function verificando() {
            var pais = window.document.getElementById('ct')
            var res = window.document.getElementById('res')
            var p = pais.value
            
            if (pais.value == 'brasil') {
                res.innerHTML = `Morando no ${p}, você é <strong>Brasileiro</strong>!`
            } else {
                res.innerHTML = `Morando no ${p}, você é <strong>Estrangeiro</strong>!`
            }
        }
    </script>



</body>
</html>
