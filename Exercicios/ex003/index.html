<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo JavaScript</title>
    <style>
        body{
            background-color: rgb(106, 80, 177);
            color: white;
            font: normal 20pt Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Ja me livrei da maldição</p>
    <script>
        /*aqui a variavel n1 e n2 vão receber os dados do "window.prompt"*/
       var n1/*n1 = numero1*/= Number(window.prompt('Digite um número: ')) //prompt recebe valor string
       var n2/*n2 = numero2*/= Number(window.prompt('Digite outro número: ')) 
       var s /*s = soma*/ = n1 + n2
       window.alert(`A soma de ${n1} e ${n2} é igual a: ${s}`)
       //quando for usar a "${}" abre e fecha com crase. "  ``   "
        
    </script>
</body>
</html>
