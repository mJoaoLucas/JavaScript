<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        #res {
            margin-top: 20px;
        }

        #botaozin {
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <h1>Somando valores</h1>
    <input type="number" name="txtn1" id="txtn1"> <p>+</p>
    <input type="number" name="txtn2" id="txtn2"> <p>-</p>
    <input type="number" name="txtn3" id="txtn3"> 
    <input type="button" value="=" onclick="conta()" id="botaozin">
    <div id="res">
        resultado
    </div>
    
    <script>
        function conta() {
            var tn1 =  window.document.getElementById('txtn1')
            var tn2 =  window.document.getElementById('txtn2')
            var tn3 =  window.document.getElementById('txtn3')
            var res = window.document.getElementById('res')
            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var n3 = Number(tn3.value)
            var s = n1 + n2 - n3
            res.innerHTML = `o resultado de ${n1} + ${n2} - ${n3} é igual a <strong>${s}</strong> `
        }
    </script>
</body>
</html>
